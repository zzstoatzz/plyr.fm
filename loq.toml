default_max_lines = 500
respect_gitignore = true

# paths, files, or glob patterns to exclude
exclude = [
    ".git/**",
    ".claude/worktrees/**",
    ".status_history/**",
]

# lock files don't need line limits
[[rules]]
path = "**/*.lock"
max_lines = 10000

[[rules]]
path = "**/package-lock.json"
max_lines = 10000

