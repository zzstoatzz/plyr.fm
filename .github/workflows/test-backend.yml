name: backend tests

on:
  pull_request:
    paths:
      - "backend/src/backend/**"
      - "backend/tests/**"
      - "backend/pyproject.toml"
      - "backend/uv.lock"
      - ".github/workflows/test-backend.yml"

permissions:
  contents: read

jobs:
  test:
    timeout-minutes: 10
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: relay_test
          POSTGRES_PASSWORD: relay_test
          POSTGRES_DB: relay_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: set up python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "backend/uv.lock"

      - name: install dependencies
        run: cd backend && uv sync --locked

      - name: run tests
        env:
          DATABASE_URL: postgresql+asyncpg://relay_test:relay_test@localhost:5432/relay_test
          DOCKET_URL: redis://localhost:6379
        run: cd backend && uv run pytest tests/ -n auto

      # Repository secrets are unavailable to fork PRs. Keep them scoped to the
      # one live-boundary test rather than exposing them to the whole suite.
      - name: run live private-media integration
        if: github.event.pull_request.head.repo.full_name == github.repository
        env:
          DATABASE_URL: postgresql+asyncpg://relay_test:relay_test@localhost:5432/relay_test
          DOCKET_URL: redis://localhost:6379
          ZAT_TEST_PDS: ${{ secrets.ZAT_TEST_PDS }}
          ZAT_TEST_HANDLE: ${{ secrets.ZAT_TEST_HANDLE }}
          ZAT_TEST_PASSWORD: ${{ secrets.ZAT_TEST_PASSWORD }}
        run: |
          test -n "$ZAT_TEST_PDS"
          test -n "$ZAT_TEST_HANDLE"
          test -n "$ZAT_TEST_PASSWORD"
          cd backend
          uv run pytest tests/integration/test_private_media.py -v --tb=short

      - name: prune uv cache
        if: always()
        run: uv cache prune --ci
