name: deploy prod

on:
  release:
    types: [published]

jobs:
  deploy:
    name: deploy prod
    runs-on: ubuntu-latest
    concurrency: deploy-backend-production
    steps:
      - uses: actions/checkout@v4

      - name: detect changes
        uses: dorny/paths-filter@v3
        id: changes
        with:
          filters: .github/path-filters.yml

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: deploy to fly.io production
        run: |
          if [ "${{ steps.changes.outputs.migrations }}" == "true" ]; then
            echo "🔄 migrations detected - will run via release_command before deployment"
          fi
          flyctl deploy --config backend/fly.toml --remote-only -a relay-api .
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN_PROD }}

      - name: notify deploy failure
        if: failure()
        run: uvx --with atproto python scripts/notify_deploy_failure.py
        env:
          BSKY_NOTIFY_HANDLE: ${{ secrets.BSKY_NOTIFY_HANDLE }}
          BSKY_NOTIFY_PASSWORD: ${{ secrets.BSKY_NOTIFY_PASSWORD }}
          BSKY_NOTIFY_RECIPIENT: ${{ secrets.BSKY_NOTIFY_RECIPIENT }}
