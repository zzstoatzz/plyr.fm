name: deploy prod

on:
  release:
    types: [published]

jobs:
  deploy:
    name: deploy prod
    runs-on: ubuntu-latest
    concurrency: deploy-backend-production
    steps:
      - uses: actions/checkout@v4

      - name: detect changes
        uses: dorny/paths-filter@v3
        id: changes
        with:
          filters: .github/path-filters.yml

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: deploy to fly.io production
        run: |
          if [ "${{ steps.changes.outputs.migrations }}" == "true" ]; then
            echo "🔄 migrations detected - will run via release_command before deployment"
          fi
          flyctl deploy --config backend/fly.toml --remote-only -a relay-api .
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN_PROD }}

      - name: install uv
        if: failure()
        uses: astral-sh/setup-uv@v7

      - name: notify deploy failure
        if: failure()
        run: uvx --with atproto python scripts/notify_deploy_failure.py
        env:
          NOTIFY_BOT_HANDLE: ${{ secrets.NOTIFY_BOT_HANDLE }}
          NOTIFY_BOT_PASSWORD: ${{ secrets.NOTIFY_BOT_PASSWORD }}
          NOTIFY_RECIPIENT_HANDLE: ${{ secrets.NOTIFY_RECIPIENT_HANDLE }}
