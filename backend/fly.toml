app = 'relay-api'
primary_region = 'iad'

[build]
  dockerfile = "Dockerfile"
  ignore_file = ".dockerignore"

[deploy]
  release_command = "uv run --no-dev alembic upgrade head"

# two process groups so a runaway upload task in `worker` cannot OOM the
# `app` process serving HTTP. see backend/worker.py for the worker
# entrypoint and docs/internal/runbooks/upload-oom-cycle.md for the
# incident that motivated the split.
[processes]
  app = "uv run --no-sync uvicorn backend.main:app --host 0.0.0.0 --port 8000"
  worker = "uv run --no-sync python -m backend.worker"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

  [http_service.concurrency]
    type = 'requests'
    hard_limit = 250
    soft_limit = 200

  [[http_service.checks]]
    interval = "10s"
    timeout = "5s"
    grace_period = "30s"
    method = "GET"
    path = "/health"

# `app` only serves HTTP; sized for request fan-out, not for in-memory
# audio processing.
[[vm]]
  processes = ['app']
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1

# `worker` runs the docket Worker — runs run_track_upload, transcode
# fetches, etc. headroom for the in-memory audio bytes the upload
# pipeline currently holds (tracked in #1357).
[[vm]]
  processes = ['worker']
  memory = '2gb'
  cpu_kind = 'shared'
  cpus = 1

# always restart the worker on exit, with no retry budget. fly's default
# (`on-failure`, max_retries=10) gave up after 10 consecutive OOMs on
# 2026-05-06 and left the machine `stopped` for ~4 days; see
# docs/internal/retrospectives/2026-05-10-worker-oom-loop-streaming.md.
# for a singleton worker that owns the only consumer of the upload queue,
# there is no scenario where giving up is the correct outcome — a noisy
# restart loop is loud (alerting catches it) and useful (occasional
# successful runs drain the queue). `app` keeps fly's default because
# it has health checks + multiple machines for HTTP redundancy.
[[restart]]
  policy = "always"
  processes = ["worker"]

[env]
  PORT = '8000'
  STORAGE_BACKEND = 'r2'
  R2_BUCKET = 'audio-prod'
  R2_ENDPOINT_URL = 'https://8feb33b5fb57ce2bc093bc6f4141f40a.r2.cloudflarestorage.com'
  R2_PUBLIC_BUCKET_URL = 'https://pub-d4ed8a1e39d44dac85263d86ad5676fd.r2.dev'
  # Identify ourselves to bsky.social's edge so generic-SDK-UA WAF rules
  # don't 403 us. See bluesky-social/atproto#4764 and our 2026-05-17 outage.
  # Unset this env var (locally remove the line or `fly secrets unset`) to
  # fall back to httpx's default `python-httpx/X.Y` User-Agent.
  ATPROTO_USER_AGENT = 'plyr.fm/1.0 (+https://plyr.fm)'

# secrets to set via: fly secrets set KEY=value -a relay-api
# - DATABASE_URL (neon postgres connection string)
# - AWS_ACCESS_KEY_ID (cloudflare R2)
# - AWS_SECRET_ACCESS_KEY (cloudflare R2)
# - OAUTH_ENCRYPTION_KEY (generate: python -c 'from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())')
# - DOCKET_URL (self-hosted redis: redis://plyr-redis.internal:6379)
