# fly.toml app configuration file generated for relay-api-staging on 2025-11-05T21:05:32-06:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'relay-api-staging'
primary_region = 'iad'

[build]
  dockerfile = "Dockerfile"
  ignore_file = ".dockerignore"

[deploy]
  release_command = 'uv run --no-dev alembic upgrade head'

[env]
  # Mirror backend/fly.toml — identify ourselves to bsky.social's edge so
  # generic SDK UAs don't 403 us. See #1416.
  ATPROTO_USER_AGENT = 'plyr.fm/1.0 (+https://plyr.fm)'
  PORT = '8000'
  R2_BUCKET = 'audio-staging'
  R2_ENDPOINT_URL = 'https://8feb33b5fb57ce2bc093bc6f4141f40a.r2.cloudflarestorage.com'
  R2_PUBLIC_BUCKET_URL = 'https://pub-0a0a2e70496c461581c9fafb442b269d.r2.dev'
  STORAGE_BACKEND = 'r2'

# two process groups so a runaway upload task in `worker` cannot OOM the
# `app` process serving HTTP. mirrors backend/fly.toml — staging needs
# the same structural split for smoke testing to exercise it. sizing is
# smaller than prod since staging carries less load.
[processes]
  app = "uv run --no-sync uvicorn backend.main:app --host 0.0.0.0 --port 8000"
  worker = "uv run --no-sync python -m backend.worker"
  # mirrors backend/fly.toml — the jetstream consumer runs on its own event
  # loop, isolated from the worker's blocking tasks. keep at a single machine.
  jetstream = "uv run --no-sync python -m backend.jetstream"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

  [http_service.concurrency]
    type = 'requests'
    hard_limit = 250
    soft_limit = 200

  [[http_service.checks]]
    interval = "10s"
    timeout = "5s"
    grace_period = "30s"
    method = "GET"
    path = "/health"

[[vm]]
  processes = ['app']
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1

[[vm]]
  processes = ['worker']
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1

# the docket client registers the full task collection at startup, pulling in
# the whole backend import graph (~400MB RSS) — 512mb OOM-crash-loops, so 1gb.
[[vm]]
  processes = ['jetstream']
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1

# always restart the worker on exit, with no retry budget. mirrors prod
# fly.toml — staging needs the same restart policy so the silence /
# crash-loop alerts can be smoke-tested against staging before going to
# prod (see docs/internal/runbooks/worker-silence-alert.md).
[[restart]]
  policy = "always"
  processes = ["worker"]

[[restart]]
  policy = "always"
  processes = ["jetstream"]

# secrets to set via: fly secrets set KEY=value -a relay-api-staging
# - DATABASE_URL (neon postgres connection string)
# - AWS_ACCESS_KEY_ID (cloudflare R2)
# - AWS_SECRET_ACCESS_KEY (cloudflare R2)
# - OAUTH_ENCRYPTION_KEY (generate: python -c 'from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())')
# - DOCKET_URL (self-hosted redis: redis://plyr-redis-stg.internal:6379)
