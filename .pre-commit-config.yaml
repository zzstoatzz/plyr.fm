fail_fast: false

repos:
  - repo: https://github.com/jakekaplan/loq
    rev: v0.1.0-alpha.7
    hooks:
      - id: loq

  - repo: https://github.com/abravalheri/validate-pyproject
    rev: v0.24.1
    hooks:
      - id: validate-pyproject
        files: ^backend/pyproject\.toml$

  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v3.1.0
    hooks:
      - id: prettier
        types_or: [yaml, json5]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.12.1
    hooks:
      - id: ruff-check
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format

  - repo: local
    hooks:
      - id: type-check
        name: type check
        entry: bash -c 'cd backend && uv run ty check'
        language: system
        types: [python]
        pass_filenames: false

      - id: svelte-check
        name: svelte check
        entry: bash -c 'cd frontend && bun run check'
        language: system
        files: ^frontend/
        pass_filenames: false

      - id: eslint
        name: eslint
        entry: bash -c 'cd frontend && bun run lint'
        language: system
        files: ^frontend/.*\.(ts|svelte)$
        pass_filenames: false

      - id: vitest
        name: frontend tests
        entry: bash -c 'cd frontend && bun run test'
        language: system
        files: ^frontend/.*\.(ts|svelte)$
        pass_filenames: false

      - id: check-legal-dates
        name: check legal dates
        entry: python scripts/check_legal_dates.py
        language: system
        files: ^frontend/src/routes/privacy/\+page\.svelte$
        pass_filenames: true

      - id: check-oauth-scope-universe
        name: oauth scope universe (runtime ⊆ published metadata)
        # runs when any of:
        #   - the runtime scope composer (config.py)
        #   - the metadata endpoint (api/meta.py)
        #   - the oauth client construction (auth/oauth.py)
        #   - any lexicon record module (records/*)
        # changes. cheap to run (~0.5s pytest startup + 1 instant test). guards
        # against adding a new repo: scope to the runtime composer but forgetting
        # to declare it in /oauth-client-metadata.json — failure mode is PAR
        # invalid_scope at login, hard to debug without auth-server logs.
        entry: bash -c 'cd backend && uv run pytest tests/api/test_oauth_client_metadata.py -q'
        language: system
        files: ^backend/src/backend/(config\.py|api/meta\.py|_internal/auth/oauth\.py|_internal/atproto/records/.+)
        pass_filenames: false

      - id: cargo-check-moderation
        name: cargo check (moderation)
        entry: bash -c 'cd services/moderation && cargo check --quiet'
        language: system
        files: ^services/moderation/.*\.rs$
        pass_filenames: false

      - id: cargo-check-transcoder
        name: cargo check (transcoder)
        entry: bash -c 'cd services/transcoder && cargo check --quiet'
        language: system
        files: ^services/transcoder/.*\.rs$
        pass_filenames: false

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: no-commit-to-branch
        name: prevent commits to main
        args: [--branch, main]
